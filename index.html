\xF3n: abre la direcci\xF3n de la app en Chrome o Samsung Internet \u2192 men\xFA \u22EE \u2192 Instalar aplicaci\xF3n.","Actualizaciones: sube el nuevo index.html a tu repositorio de GitHub con el mismo nombre, cierra la app y \xE1brela con internet. Tus datos no se tocan.","Respaldo: en Cierre \u2192 Respaldo de datos, exporta un .json de vez en cuando (y siempre antes de actualizar)."]},{id:"regleta",t:"Barra superior (regleta de estado)",c:["Los tres indicadores son lecturas en vivo, como un panel HMI: tiempo registrado hoy (rojo parpadeando si el cron\xF3metro corre), pendientes de hoy + vencidos, y dinero en juego del pipeline. T\xF3calos para saltar a su pesta\xF1a.","El punto cambia de color seg\xFAn el estado: verde = en orden, \xE1mbar = requiere atenci\xF3n, rojo = hay vencidos.","Micr\xF3fono = Asistente por voz. Signo de interrogaci\xF3n = este manual.","Toca el nombre Centro de Control para volver a la pantalla de inicio con tu resumen del d\xEDa en cualquier momento."]},{id:"hoy",t:"Hoy \u2014 pendientes",c:["Captura r\xE1pida: escribe el pendiente, elige Hoy / Ma\xF1ana / Otra fecha, opcionalmente una hora, y toca +.","Toca un pendiente para abrirlo: cliente, fecha, hora de inicio y fin, fecha de finalizaci\xF3n, prioridad y ligarlo a una oportunidad del pipeline.","Dentro del pendiente: Agendar lo manda pre-llenado a Google Calendar; el bot\xF3n de compartir lo env\xEDa individual a Google Tasks o Keep.","\u2192 ma\xF1ana lo reprograma con un toque. Las secciones Vencidas (rojo) y Acciones de pipeline (\xE1mbar) aparecen solo cuando existen.","Cerrar el d\xEDa: resumen de lo completado, tiempo registrado, opci\xF3n de mover todo lo incompleto a ma\xF1ana y alerta de oportunidades sin pr\xF3xima acci\xF3n. \xDAsalo cada tarde: nada se queda en la cabeza."]},{id:"tiempo",t:"Tiempo",c:["Cron\xF3metro: elige categor\xEDa (visitas, cotizaciones, llamadas, traslados, administrativo, capacitaci\xF3n), cliente opcional, Iniciar. Sigue corriendo aunque cierres la app; Detener y guardar registra los minutos.","+ Registro manual: para capturar tiempo pasado con fecha, minutos y categor\xEDa.","Las barras muestran tu d\xEDa por categor\xEDa y tu semana por d\xEDa (la barra \xE1mbar es hoy). La lista de registros de hoy permite borrar con la X."]},{id:"pipeline",t:"Pipeline",c:["Flujo: Acuerdo de visita \u2192 Cotizado \u2192 Por cerrar \u2192 Pedido realizado \u2192 OC recibida \u2192 Ganado \u2192 Facturado (o Perdido).","Regla de oro: toda oportunidad activa debe tener pr\xF3xima acci\xF3n con fecha. La app te lo recuerda con la franja \xE1mbar y en el cierre del d\xEDa.","Tarjeta: toca para editar; Avanzar la pasa a la siguiente etapa; Agendar manda la pr\xF3xima acci\xF3n a Google Calendar.","En etapas Pedido, OC, Ganado y Facturado aparecen los campos N\xB0 de pedido y N\xB0 de factura; se muestran como etiquetas en la tarjeta y se incluyen en el CSV de Monday.","Cuando cobres una oportunidad Ganada, av\xE1nzala a Facturado para cerrar el ciclo completo.","Busca por cliente, marca o plaza, y filtra por etapa con los chips. 'En juego' suma las etapas activas."]},{id:"metas",t:"Metas y proyectos",c:["Tres horizontes: corto (1\u20133 meses), mediano (3\u201312) y largo (1\u20133 a\xF1os). Agrega con el campo inferior y marca cumplidas con el c\xEDrculo.","Toca una meta para ponerle fecha de inicio y fin: en ese momento se vuelve un proyecto y aparece como barra en el Cronograma.","Cronograma (Gantt): cada barra es una meta con fechas; el color indica el plazo, verde = cumplida, y la l\xEDnea roja vertical marca hoy."]},{id:"asistente",t:"Asistente por voz",c:["\xC1brelo con el micr\xF3fono de la barra superior. Dicta o escribe varias cosas seguidas y toca Interpretar: la app las clasifica en pendientes, oportunidades, metas o registros de tiempo.","Vista previa: toca cualquier elemento para incluirlo o excluirlo antes de Crear.","Motor Local (gratis): entiende patrones como 'Llamar a Preisa ma\xF1ana a las 10', 'Visita
