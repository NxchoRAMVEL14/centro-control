 con internet. Tus datos no se tocan.","Respaldo: en Cierre \u2192 Respaldo de datos, exporta un .json de vez en cuando (y siempre antes de actualizar)."]},{id:"regleta",t:"Barra superior (regleta de estado)",c:["Los tres indicadores son lecturas en vivo, como un panel HMI: tiempo registrado hoy (rojo parpadeando si el cron\xF3metro corre), pendientes de hoy + vencidos, y dinero en juego del pipeline. T\xF3calos para saltar a su pesta\xF1a.","El punto cambia de color seg\xFAn el estado: verde = en orden, \xE1mbar = requiere atenci\xF3n, rojo = hay vencidos.","Micr\xF3fono = Asistente por voz. Signo de interrogaci\xF3n = este manual.","Toca el nombre Centro de Control para volver a la pantalla de inicio con tu resumen del d\xEDa en cualquier momento."]},{id:"hoy",t:"Hoy \u2014 pendientes",c:["Captura r\xE1pida: escribe el pendiente, elige Hoy / Ma\xF1ana / Otra fecha, opcionalmente una hora, y toca +.","Toca un pendiente para abrirlo: cliente, fecha, hora de inicio y fin, fecha de finalizaci\xF3n, prioridad y ligarlo a una oportunidad del pipeline.","Dentro del pendiente: Agendar lo manda pre-llenado a Google Calendar; el bot\xF3n de compartir lo env\xEDa individual a Google Tasks o Keep.","Comentarios: dentro de cada pendiente puedes anotar acuerdos o qu\xE9 resolviste; los pendientes con comentario muestran un \xEDcono de globo.","Los pendientes de hoy se ordenan por prioridad: primero los de prioridad alta y, dentro de cada nivel, por hora.","\u2192 ma\xF1ana lo reprograma con un toque. Las secciones Vencidas (rojo) y Acciones de pipeline (\xE1mbar) aparecen solo cuando existen.","Cerrar el d\xEDa: resumen de lo completado, tiempo registrado, opci\xF3n de mover todo lo incompleto a ma\xF1ana y alerta de oportunidades sin pr\xF3xima acci\xF3n. \xDAsalo cada tarde: nada se queda en la cabeza."]},{id:"tiempo",t:"Tiempo",c:["Cron\xF3metro: elige categor\xEDa (visitas, cotizaciones, llamadas, traslados, administrativo, capacitaci\xF3n), cliente opcional, Iniciar. Sigue corriendo aunque cierres la app; Detener y guardar registra los minutos.","+ Registro manual: para capturar tiempo pasado con fecha, minutos y categor\xEDa.","Las barras muestran tu d\xEDa por categor\xEDa y tu semana por d\xEDa (la barra \xE1mbar es hoy). En Registros recientes ves los \xFAltimos movimientos de cualquier d\xEDa y puedes eliminar cualquiera con la X, incluidos los de d\xEDas anteriores."]},{id:"pipeline",t:"Pipeline",c:["Flujo: Acuerdo de visita \u2192 Cotizado \u2192 Por cerrar \u2192 Pedido realizado \u2192 OC recibida \u2192 Ganado \u2192 Facturado (o Perdido).","Regla de oro: toda oportunidad activa debe tener pr\xF3xima acci\xF3n con fecha. La app te lo recuerda con la franja \xE1mbar y en el cierre del d\xEDa.","Tarjeta: toca para editar; Avanzar la pasa a la siguiente etapa; Agendar manda la pr\xF3xima acci\xF3n a Google Calendar.","El resumen muestra tres cifras: En juego (etapas vivas), Pedido (pedido y OC) y Facturado (cobrado). Con el selector Acumulado por mes ves lo facturado, pedido y los movimientos de cada mes.","Desde la etapa Cotizado aparecen N\xB0 de cotizaci\xF3n y OC del cliente; desde Pedido, N\xB0 de pedido y factura. Todos se muestran como etiquetas y salen en el CSV de Monday.","Margen: captura el porcentaje con que vendiste; se muestra en la tarjeta y alimenta el c\xE1lculo de comisiones.","Comisiones: el bot\xF3n Calcular comisiones toma una oportunidad ya facturada, su monto y margen, y con tu porcentaje calcula utilidad y tu pago.","Cuando cobres una oportunidad Ganada, av\xE1nzala a Facturado para cerrar el ciclo completo.","Busca por cliente, marca o plaza, y filtra por etapa con los chips (Todas queda al inicio)."]},{id:"metas",t:"Metas y proyectos",c:["Tres horizontes: corto (1\u20133 meses), mediano (3\u201312) y largo (1\u20133 a\xF1os). Agrega con el campo inferior y marca cumplidas con el c\xEDrculo.","Toca una meta para ponerle fecha de inicio y fin: en ese momento se vuelve un proyecto y aparece como barra en el Cronograma.","Cronograma (Gantt): cada barra es una meta con fechas; el color indica el plazo, verde = cumplida, y la l\xEDnea roja vertical marca hoy."]},{id:"asistente",t:"Asistente por voz",c:["\xC1brelo con el micr\xF3fono de la barra superior. Dicta o escribe varias cosas seguidas y toca Interpretar: la app las clasifica en pendientes, oportunidades, metas o registros de tiempo.","Vista previa: toca cualquier elemento para incluirlo o excluirlo antes de Crear.","Motor Local (gratis): entiende patrones como 'Llamar a Preisa ma\xF1ana a las 10', 'Visita con CFE el viernes de 9 a 11', 'Oportunidad con Femsa por 250 mil, cotizado', 'Meta corto plazo: cerrar 3 proyectos', 'Registra 45 minutos de traslados'.","Motor Claude API (opcional): entiende lenguaje totalmente libre usando tu propia clave de console.anthropic.com. La clave se guarda solo en tu dispositivo, nunca viaja en los respaldos, y el costo es de centavos por dictado.","El dictado usa el reconocimiento del navegador: funciona mejor en Chrome."]},{id:"cierre",t:"Cierre \u2014 reportes, exportar y respaldo",c:["Cierre de semana: tus n\xFAmeros de la semana y Copiar resumen para pegarlo en un reporte o mensaje a tu jefe.","Exportar a Monday: CSV de pipeline, pendientes y tiempo listos para Importar datos \u2192 Excel/CSV en tu tablero.","Enviar a Google Tasks / Keep: filtra pendientes, completados o todos, y Compartir abre el men\xFA de Android (Tasks crea una tarea con la lista; Keep una nota). Copiar lista sirve para pegar en la PC.","Respaldo de datos: Exportar genera un .json completo; Importar lo restaura en otro dispositivo o tras un cambio de tel\xE9fono.","Mejoras de la app: anota cualquier fricci\xF3n; el bot\xF3n Copiar lista para Claude arma el mensaje exacto para pedir la siguiente versi\xF3n."]},{id:"vers",t:"Novedades por versi\xF3n",c:["v2.0 \u2014 Resumen del pipeline con Pedido y Facturado y acumulado por mes; margen y calculadora de comisiones; N\xB0 de cotizaci\xF3n y OC del cliente; filtro Todas al inicio.","v1.9 \u2014 Comentarios en los pendientes; orden por prioridad en Hoy; los registros de tiempo de d\xEDas anteriores ya se pueden eliminar.","v1.8 \u2014 El nombre Centro de Control en la barra superior regresa a la pantalla de inicio.","v1.7 \u2014 Pantalla de inicio en cada apertura: fecha completa con a\xF1o y resumen de pendientes del d\xEDa estilo notificaciones.","v1.6 \u2014 Pantalla de inicio y este manual con \xEDndice (bot\xF3n ?); N\xB0 de pedido y factura con etapa Facturado; metas con fechas y cronograma Gantt.","v1.5 \u2014 Env\xEDo de pendientes a Google Tasks y Keep: lista con filtro y bot\xF3n individual por pendiente.","v1.4 \u2014 Agendar en Google Calendar; horas de inicio y fin en pendientes; Asistente por voz con int\xE9rprete Local y Claude API.","v1.3 \u2014 Correcci\xF3n de estilos en la versi\xF3n publicada (Tailwind incluido en el archivo).","v1.2 \u2014 Versi\xF3n PWA instalable con guardado local y Respaldo exportar/importar.","v1.1 \u2014 Bit\xE1cora de mejoras con generador de prompt para Claude.","v1.0 \u2014 Tablero inicial: pendientes, tiempo, pipeline, metas, cierre de d\xEDa/semana y export a Monday."]}];function ox({onCerrar:e}){let[a,t]=(0,R.useState)(null);return(0,n.jsx)("div",{className:"fixed inset-0 z-50 flex flex-col justify-end",style:{background:"rgba(20,28,38,0.55)"},onClick:e,children:(0,n.jsxs)("div",{className:"rounded-t-2xl max-h-full overflow-y-auto w-full max-w-xl mx-auto",style:{background:s.fondo},onClick:o=>o.stopPropagation(),children:[(0,n.jsxs)("div",{className:"sticky top-0 flex items-center justify-between px-4 py-3 border-b",style:{background:s.bezel,borderColor:s.bezel2},children:[(0,n.jsxs)("span",{style:{...de,letterSpacing:"0.14em"},className:"uppercase font-bold flex items-center gap-2",children:[(0,n.jsx)(Lr,{size:16,style:{color:s.ambar}}),(0,n.jsx)("span",{style:{color:"#fff"},children:"Manual"})]}),(0,n.jsx)("button",{onClick:e,children:(0,n.jsx)(Ve,{size:20,style:{color
